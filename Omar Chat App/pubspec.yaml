name: omar_chat
description: OMAR Chat - WhatsApp-style Flutter messaging app for CEN306.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  flutter_local_notifications: ^19.2.1
  flutter_tts: ^4.2.2
  image_picker: ^1.1.2
  file_picker: ^9.2.3
  permission_handler: ^12.0.0+1
  just_audio: ^0.10.4
  record: ^6.0.0
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/mountain_landscape.png
    - assets/sounds/
    - assets/avatars/
dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.23